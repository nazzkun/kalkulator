<!DOCTYPE html><html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator</title><link rel="stylesheet" href="styless.css">

</head>
<body><div class="calculator">

    <div id="historyPreview" class="history-preview">
        Tidak ada riwayat
    </div>

    <button class="history-btn" onclick="toggleHistory()">
        📚 History
    </button>

    <input
        type="text"
        id="display"
        class="display"
        value="0"
        readonly
    >

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="function" onclick="backspace()">⌫</button>
        <button class="function" onclick="percent()">%</button>
        <button class="operator" onclick="setOperator('/')">÷</button>

        <button class="function" onclick="sqrt()">√</button>
        <button class="function" onclick="square()">x²</button>
        <button class="function" onclick="power()">xʸ</button>
        <button class="operator" onclick="setOperator('*')">×</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="setOperator('-')">−</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="setOperator('+')">+</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>

        <button
            class="equal equal-large"
            onclick="calculate()"
        >
            =
        </button>

        <button class="function" onclick="toggleSign()">[-]</button>
        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>

    </div>
</div>

<div id="historyModal" class="history-modal">

    <div class="history-box">

        <div class="history-header">
            <h3>Riwayat</h3>

            <button
                class="clear history-clear-btn"
                onclick="clearHistory()"
            >
                Hapus
            </button>
        </div>

        <div id="historyList">
            Belum ada riwayat
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
